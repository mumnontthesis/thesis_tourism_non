# Render Blueprint — deploy backend อัตโนมัติจาก GitHub
# https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: thesis-tourism-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: tourism_nonthaburi
      - key: DB_PORT
        value: "3306"
      - key: CORS_ORIGIN
        sync: false
